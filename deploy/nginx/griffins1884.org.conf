server {
    # Bind 443 only on the public IPs so tailscaled can keep port 443
    # on the tailnet addresses.
    listen 46.225.177.225:443 ssl;
    listen [2a01:4f8:1c19:171c::1]:443 ssl;
    server_name griffins1884.org www.griffins1884.org;

    include /etc/nginx/snippets/frc1884-scouting.locations.conf;
    include /etc/nginx/snippets/frc1884-strategy.locations.conf;

    ssl_certificate /etc/letsencrypt/live/griffins1884.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/griffins1884.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name griffins1884.org www.griffins1884.org;

    return 301 https://$host$request_uri;
}
